name: hms-quickstart

networks:
  hmsnet:
    name: hmsnet
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:

  # ── PostgreSQL — HMS metastore backend ─────────────────────────────
  postgres:
    image: postgres:15
    container_name: hmsqs-postgres
    networks: [hmsnet]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO — S3-compatible object storage ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hmsqs-minio
    networks: [hmsnet]
    environment:
      MINIO_ROOT_USER: gravitino
      MINIO_ROOT_PASSWORD: gravitino123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── MinIO bucket init ──────────────────────────────────────────────
  mc-init:
    image: minio/mc:latest
    container_name: hmsqs-mc-init
    networks: [hmsnet]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 gravitino gravitino123 &&
        mc mb local/warehouse --ignore-existing &&
        echo 'Bucket ready.'
      "

  # ── Hive Metastore ─────────────────────────────────────────────────
  # PostgreSQL backend + S3A jars (hadoop-aws-3.3.6 + aws-java-sdk-bundle-1.12.367)
  # This is the single HMS under test — both hive_catalog and iceberg_catalog
  # in Trino point to this same thrift://hms:9083 endpoint.
  hms:
    build: ./hms
    container_name: hmsqs-hms
    networks: [hmsnet]
    depends_on:
      postgres:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9083' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

  # ── Trino ──────────────────────────────────────────────────────────
  # hive_catalog    → connector.name=hive    → thrift://hms:9083
  # iceberg_catalog → connector.name=iceberg → thrift://hms:9083
  trino:
    image: trinodb/trino:435
    container_name: hmsqs-trino
    networks: [hmsnet]
    depends_on:
      hms:
        condition: service_healthy
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # ── Init — creates all tables via Trino SQL ────────────────────────
  init:
    build: ./init
    container_name: hmsqs-init
    networks: [hmsnet]
    depends_on:
      trino:
        condition: service_healthy

  # ── Spark — queries all assets via SparkSessionCatalog ────────────
  # Single catalog connection to thrift://hms:9083.
  # Reads tables created by the init container — does not create anything.
  # Run with: make spark-proof
  spark:
    build: ./spark
    container_name: hmsqs-spark
    networks: [hmsnet]
    depends_on:
      hms:
        condition: service_healthy
